@if (user()) {
  <header class="topbar">
    <span class="brand"><mat-icon class="heart">favorite</mat-icon> Backoffice</span>
    <span class="spacer"></span>
    <button mat-icon-button (click)="logout()" aria-label="Esci"><mat-icon>logout</mat-icon></button>
  </header>
}

<main class="app-main">
  <router-outlet></router-outlet>
</main>

@if (user()) {
  <nav class="tabbar" aria-label="Navigazione backoffice">
    <a class="tab" routerLink="/" routerLinkActive="on" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>dashboard</mat-icon><span>Sintesi</span>
    </a>
    <span class="tab disabled"><mat-icon>list_alt</mat-icon><span>Feedback</span></span>
    <span class="tab disabled"><mat-icon>category</mat-icon><span>Categorie</span></span>
  </nav>
}
