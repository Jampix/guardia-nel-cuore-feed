<!-- Chrome (top-bar desktop / bottom-tab mobile) solo da autenticati. -->
@if (user()) {
  <header class="topbar">
    <a class="brand" routerLink="/"><mat-icon class="heart">favorite</mat-icon> Guardia nel Cuore</a>
    <nav class="links">
      <a routerLink="/" routerLinkActive="on" [routerLinkActiveOptions]="{ exact: true }">Bacheca</a>
      <a routerLink="/miei" routerLinkActive="on">I miei feedback</a>
      <a routerLink="/regolamento" routerLinkActive="on">Regolamento</a>
    </nav>
    <span class="grow"></span>
    <a mat-flat-button class="cta" routerLink="/nuova"><mat-icon>add</mat-icon> Nuova proposta</a>
    <a class="avatar" routerLink="/profilo" [title]="user()!.nickname || user()!.email">{{ (user()!.nickname || user()!.email).charAt(0).toUpperCase() }}</a>
  </header>
}

<main class="app-main">
  <router-outlet></router-outlet>
</main>

@if (user()) {
  <nav class="tabbar" aria-label="Navigazione principale">
    <a class="tab" routerLink="/" routerLinkActive="on" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>home</mat-icon><span>Bacheca</span>
    </a>
    <a class="tab proponi" routerLink="/nuova" routerLinkActive="on"><span class="plus"><mat-icon>add</mat-icon></span><span>Proponi</span></a>
    <a class="tab" routerLink="/miei" routerLinkActive="on"><mat-icon>view_list</mat-icon><span>I miei</span></a>
    <a class="tab" routerLink="/profilo" routerLinkActive="on"><mat-icon>person</mat-icon><span>Profilo</span></a>
  </nav>
}
