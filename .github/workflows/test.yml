name: Test

# Esegue i test unitari del backend su push a main e su ogni Pull Request che
# tocca backend/. I test simulano l'SDK AWS (aws-sdk-client-mock): nessuna
# credenziale né risorsa AWS necessaria.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm ci
      - name: Test
        working-directory: backend
        run: npm test
